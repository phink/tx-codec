[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200

# Halmos needs non-via-ir compilation (it can't parse via-ir AST)
[profile.halmos]
src = "src"
out = "out-halmos"
libs = ["lib"]
via_ir = false
extra_output = ["storageLayout"]
ast = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
